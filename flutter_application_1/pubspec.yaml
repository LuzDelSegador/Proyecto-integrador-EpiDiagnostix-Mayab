name: flutter_application_1
description: "EpiSurveillance - Portal de Vigilancia Epidemiológica"
publish_to: 'none'

version: 2.4.1+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  dio: ^5.7.0
  get_it: ^7.7.0
  flutter_svg: ^2.0.10
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  tflite_flutter: ^0.12.0
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.0
  record: 5.0.0
  whisper_flutter_new: ^1.0.0
  uuid: ^4.5.1
  flutter_secure_storage: ^9.0.0
  flutter_stripe: ^10.2.0
  geolocator: ^10.1.0
  connectivity_plus: ^6.1.0

dependency_overrides:
  record_linux:
    path: ./patches/record_linux

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/model/
